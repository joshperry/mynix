      - pgp:
          - *admin_josh
        age:
          - *liver_age

  - path_regex: secrets/mino\.yaml$
    key_groups:
      - pgp:
          - *admin_josh
        age:
          - *mino_age

  - path_regex: secrets/seed-dfw-1\.yaml$
    key_groups:
      - pgp:
          - *admin_josh
        age:
          - *seed_dfw_1_age

  - path_regex: secrets/seed-dfw-2\.yaml$
    key_groups:
      - pgp:
          - *admin_josh
